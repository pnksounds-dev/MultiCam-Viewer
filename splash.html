<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob:;
  ">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>MultiCam Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
      user-select: none;
    }
    #splash-logo {
      max-width: 420px;
      max-height: 420px;
      width: auto;
      height: auto;
      object-fit: contain;
      margin-bottom: 40px;
      animation: logoFadeIn 0.6s ease-out;
    }
    #loading-bar-container {
      width: 320px;
      height: 5px;
      background: #2a2a4a;
      border-radius: 3px;
      overflow: hidden;
    }
    #loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #e94560, #0f3460);
      border-radius: 3px;
      animation: loadingFill 2.2s ease-in-out forwards;
    }
    #splash-text {
      margin-top: 18px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #888aaa;
      letter-spacing: 1px;
      animation: textPulse 1.8s ease-in-out infinite;
    }
    @keyframes logoFadeIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes loadingFill {
      0%   { width: 0%; }
      30%  { width: 35%; }
      60%  { width: 65%; }
      80%  { width: 82%; }
      100% { width: 100%; }
    }
    @keyframes textPulse {
      0%, 100% { opacity: 0.5; }
      50%      { opacity: 1; }
    }
  </style>
</head>
<body>
  <img id="splash-logo" src="assets/MCV-SplashScreen.png?v=3" alt="MultiCam Viewer">
  <div id="loading-bar-container">
    <div id="loading-bar"></div>
  </div>
  <div id="splash-text">Loading MultiCam Viewer…</div>
  <script>
    console.log('Splash script running');
    const logo = document.getElementById('splash-logo');
    logo.src = 'assets/MCV-SplashScreen.png?v=' + Date.now();
    logo.onload = function() { console.log('Splash logo loaded'); };
    logo.onerror = function() { console.log('Splash logo failed to load'); };
  </script>
</body>
</html>
